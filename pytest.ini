[pytest]
# Pytest configuration for robotics system

# Test discovery patterns
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Test paths
testpaths = tests

# Add current directory to pythonpath
pythonpath = .:src

# Output options
addopts =
    -v
    --tb=short
    --strict-markers
    --disable-warnings
    -p no:cacheprovider

# Markers for test categories
markers =
    unit: Unit tests for individual components
    integration: Integration tests for layer communication
    simulation: Simulation-based tests
    safety: Safety constraint validation tests
    slow: Tests that take significant time to run
    integration_layer: Tests for layer-to-layer communication
    robot_api: Tests specific to Robot API layer
    hardware: Tests specific to Hardware/Simulator layer
    skill: Tests specific to skill system
    metaclaw: Tests for MetaClaw integration

# Logging
log_cli = false
log_cli_level = INFO
log_cli_format = %(asctime)s [%(levelname)8s] %(message)s
log_cli_date_format = %Y-%m-%d %H:%M:%S

# Coverage options (if pytest-cov is installed)
# Uncomment to enable coverage reporting
# addopts = --cov=src --cov-report=html --cov-report=term-missing

# Timeout for tests (if pytest-timeout is installed)
# timeout = 300

# Filter warnings
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
